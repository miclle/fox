components:
  responses:
    HTTPError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HTTPError"
      description: Error response
  schemas:
    HTTPError:
      additionalProperties: true
      properties:
        code:
          type: string
        error:
          type: string
      required:
      - code
      - error
      type: object
    server_ListUsersResponse:
      properties:
        items:
          description: Users on the current page.
          items:
            $ref: "#/components/schemas/server_User"
          type: array
        page:
          description: Current page number.
          format: int32
          type: integer
        total:
          description: Total number of users.
          format: int32
          type: integer
      type: object
    server_User:
      properties:
        email:
          description: Email address.
          type: string
        id:
          description: Stable user identifier.
          format: int64
          type: integer
        name:
          description: Display name.
          type: string
      type: object
  securitySchemes:
    BearerAuth:
      bearerFormat: JWT
      description: JWT bearer token
      scheme: bearer
      type: http
info:
  description: |
    Example API generated by fox-openapi CLI without importing OpenAPI from business code.
  title: Fox OpenAPI CLI Example
  version: 1.0.0
openapi: 3.0.3
paths:
  /users:
    get:
      description: |-
        List users.
        
        Returns users with simple page-based pagination.
      operationId: github_com_fox_gonic_fox_examples_09_openapi_cli_internal_server_listUsers
      parameters:
      - in: query
        name: page
        schema:
          description: Page number, starting at 1.
          format: int32
          minimum: 1.0
          type: integer
      - in: query
        name: page_size
        schema:
          description: Number of users per page.
          format: int32
          maximum: 100.0
          minimum: 1.0
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/server_ListUsersResponse"
          description: OK
      summary: List users.
    post:
      description: |-
        Create user.
        
        Creates a user from the JSON request body.
      operationId: github_com_fox_gonic_fox_examples_09_openapi_cli_internal_server_createUser
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  description: Email address for the new user.
                  format: email
                  type: string
                name:
                  description: Display name for the new user.
                  maxLength: 80
                  minLength: 3
                  type: string
              required:
              - name
              - email
              type: object
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/server_User"
          description: OK
        default:
          $ref: "#/components/responses/HTTPError"
      summary: Create user.
  /users/{id}:
    get:
      description: |-
        Get user.
        
        Returns one user by ID.
      operationId: github_com_fox_gonic_fox_examples_09_openapi_cli_internal_server_getUser
      parameters:
      - in: path
        name: id
        required: true
        schema:
          description: User identifier from the URL path.
          exclusiveMinimum: 0.0
          format: int64
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/server_User"
          description: OK
        default:
          $ref: "#/components/responses/HTTPError"
      summary: Get user.
servers:
- description: local development
  url: http://localhost:8080
tags:
- description: User management endpoints
  name: users
